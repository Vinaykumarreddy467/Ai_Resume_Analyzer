<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-nav-bg:    rgba(255,255,255,0.08);
      --glass-nav-bdr:   rgba(255,255,255,0.22);
      --glass-blur:      blur(38px) saturate(180%);
      --glass-card-bg:   rgba(255,255,255,0.05);
      --glass-card-bdr:  rgba(255,255,255,0.18);
      --glass-highlight: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 0 0 1px rgba(255,255,255,0.04);
      --shadow-soft:     0 8px 32px rgba(20,20,42,0.08), var(--glass-highlight);
      --text-primary:    #14142a;
      --text-secondary:  rgba(20,20,42,0.62);
      --accent:          #14142a;
      --accent-light:    rgba(20,20,42,0.07);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --nav-h: 72px;
      --dur: 0.85s;
      --ease: cubic-bezier(0.77, 0, 0.175, 1);
    }

    html, body { height: 100%; }
    body { 
      font-family: var(--font); 
      background: #cddcea; 
      overflow-x: hidden;
      position: relative;
    }

    .bg-orbs { position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden; }
    .orb { position:absolute;border-radius:50%;filter:blur(90px);opacity:.60;animation:drift 22s ease-in-out infinite alternate; }
    .orb-1{width:620px;height:620px;background:radial-gradient(circle,#a4c8e8,#7ba7cc 60%,transparent);top:-180px;left:-160px;animation-delay:0s}
    .orb-2{width:500px;height:500px;background:radial-gradient(circle,#c0b2e8,#9880d4 60%,transparent);top:30%;right:-130px;animation-delay:-8s}
    .orb-3{width:440px;height:440px;background:radial-gradient(circle,#b4ddd0,#82c2ab 60%,transparent);bottom:2%;left:14%;animation-delay:-15s}
    .orb-4{width:340px;height:340px;background:radial-gradient(circle,#f0d0bc,#d8a87c 60%,transparent);top:54%;left:55%;animation-delay:-5s}
    .orb-5{width:280px;height:280px;background:radial-gradient(circle,#fad8dc,#f2a4ae 60%,transparent);top:8%;left:42%;animation-delay:-11s}
    .orb-6{width:200px;height:200px;background:radial-gradient(circle,#d4ecc0,#a4d480 60%,transparent);top:70%;right:20%;animation-delay:-3s}
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(48px,-38px) scale(1.07)} 66%{transform:translate(-28px,44px) scale(0.95)} 100%{transform:translate(34px,24px) scale(1.05)} }

    .nav-outer { position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 28px;background:rgba(205,228,234,0.15);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px); }
    nav { display:flex;align-items:center;justify-content:space-between;background:var(--glass-nav-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-nav-bdr);border-radius:60px;padding:10px 10px 10px 28px;box-shadow:var(--shadow-soft);max-width:1400px;margin:0 auto;gap:20px; }
    #nav-brand { font-size:16.5px;font-weight:600;color:var(--text-primary);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;text-decoration:none; }
    #nav-links { display:flex;align-items:center;flex:1;justify-content:center; }
    #nav-links ul { list-style:none;display:flex;gap:2px; }
    #nav-links a { 
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      padding: 6px 15px;
      border-radius: 50px;
      transition: color 0.2s;
      white-space: nowrap;
      cursor: pointer;
    }
    #nav-links a:hover, #nav-links a.active { color: var(--text-primary); }
    .nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-cta { 
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 50px;
      cursor: pointer;
      font-family: var(--font);
      text-decoration: none;
      box-shadow: 0 2px 16px rgba(20,20,42,.30);
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(20,20,42,.40);
    }

    /* ─── MAIN CONTAINER ───────────────────────────────────────────── */
    .dashboard { 
      position: relative;
      z-index: 1;
      padding: calc(var(--nav-h) + 32px) 48px 60px;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ─── SECTION TITLE ────────────────────────────────────────────── */
    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -1px;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.9s var(--ease) forwards;
    }
    .section-title strong { font-weight: 700; }

    /* ─── CARD COMPONENT ───────────────────────────────────────────── */
    .card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }
    .card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }
    .card.reveal {
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      animation: cardReveal 0.8s var(--ease) forwards;
    }

    /* ─── ANIMATIONS ───────────────────────────────────────────────── */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes countUp {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes stepComplete {
      0%, 40% { opacity: 0; transform: scale(0.8); }
      50% { opacity: 1; }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ─── UPLOAD SECTION ───────────────────────────────────────────── */
    .upload-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 48px;
    }

    .upload-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
    }
    .upload-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .upload-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: block;
      letter-spacing: -0.2px;
    }

    .drop-zone {
      border: 2px dashed rgba(20,20,42,0.15);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.02);
      margin-bottom: 16px;
    }
    .drop-zone:hover {
      border-color: rgba(20,20,42,0.30);
      background: rgba(255,255,255,0.04);
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(20,20,42,0.08);
    }

    .drop-zone-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .drop-zone-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .drop-zone-hint {
      font-size: 12px;
      color: rgba(20,20,42,0.45);
    }

    .btn-browse {
      background: var(--accent-light);
      border: 1px solid rgba(20,20,42,0.10);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      transition: all 0.2s ease;
      display: inline-block;
      margin-top: 8px;
    }
    .btn-browse:hover {
      background: rgba(20,20,42,0.12);
      border-color: rgba(20,20,42,0.18);
    }

    .upload-file-info {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(20,20,42,0.08);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      display: none;
    }
    .upload-file-info.visible { display: block; }
    .upload-file-info strong { color: var(--text-primary); font-weight: 600; }

    .hidden-input { display: none; }

    .btn-analyze {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.3s ease;
      margin-top: 24px;
      box-shadow: 0 2px 16px rgba(20,20,42,.30);
      letter-spacing: -0.2px;
    }
    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(20,20,42,.40);
    }
    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ─── PROGRESS TIMELINE ────────────────────────────────────────── */
    .progress-section {
      margin-bottom: 48px;
      display: none;
    }
    .progress-section.visible { display: block; }

    .progress-timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
    }

    .progress-step {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      position: relative;
      transition: all 0.3s ease;
      opacity: 0;
      animation: slideInUp 0.6s var(--ease) forwards;
    }

    .progress-step.complete {
      background: rgba(76, 175, 80, 0.10);
      border-color: rgba(76, 175, 80, 0.30);
    }

    .progress-step-icon {
      font-size: 20px;
      margin-bottom: 8px;
      display: block;
    }

    .progress-step-icon.checkmark {
      color: #4caf50;
      animation: stepComplete 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) both;
    }

    .progress-step-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      font-weight: 500;
    }

    /* ─── METRICS SECTION ──────────────────────────────────────────── */
    .metrics-section {
      margin-bottom: 48px;
      display: none;
    }
    .metrics-section.visible { display: block; }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .metric-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .metric-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .metric-value {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ─── RESULTS SECTION ──────────────────────────────────────────── */
    .results-section {
      margin-bottom: 48px;
      display: none;
    }
    .results-section.visible { display: block; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    .result-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .result-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .result-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .result-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skill-tag {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(20,20,42,0.12);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 500;
      margin: 4px 4px 4px 0;
      flex-wrap: wrap;
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .result-item::before {
      content: '•';
      display: block;
      color: var(--text-primary);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: -2px;
    }

    .result-numbered {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .result-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      background: rgba(20,20,42,0.10);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    /* ─── INSIGHTS SECTION ────────────────────────────────────────── */
    .insights-section {
      margin-bottom: 48px;
      display: none;
    }
    .insights-section.visible { display: block; }

    .insights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .insight-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .insight-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .insight-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .insight-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(20,20,42,0.08);
    }

    .insight-meta-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .insight-meta-label {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .insight-meta-value {
      color: var(--text-primary);
      font-weight: 600;
    }

    .insight-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }

    /* ─── PERFORMANCE SECTION ──────────────────────────────────────── */
    .performance-section {
      margin-bottom: 48px;
      display: none;
    }
    .performance-section.visible { display: block; }

    .performance-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
      max-width: 500px;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }

    .performance-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(20,20,42,0.08);
    }
    .performance-item:last-child { border-bottom: none; }

    .performance-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    .performance-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    /* ─── REPORT HISTORY SECTION ──────────────────────────────────── */
    .reports-section {
      margin-bottom: 48px;
      display: none;
    }
    .reports-section.visible { display: block; }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .report-card {
      background: var(--glass-card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-card-bdr);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s ease;
      opacity: 0;
      animation: cardReveal 0.8s var(--ease) forwards;
    }
    .report-card:hover {
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(48px) saturate(200%);
      -webkit-backdrop-filter: blur(48px) saturate(200%);
    }

    .report-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .report-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      flex: 1;
    }

    .report-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      background: rgba(76, 175, 80, 0.15);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: #4caf50;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .report-time {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .report-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .report-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s ease;
    }

    .report-btn-view {
      background: rgba(20,20,42,0.10);
      color: var(--text-primary);
    }
    .report-btn-view:hover {
      background: rgba(20,20,42,0.15);
    }

    .report-btn-download {
      background: var(--accent);
      color: #fff;
    }
    .report-btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(20,20,42,.25);
    }

    /* ─── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .dashboard {
        padding: calc(var(--nav-h) + 24px) 24px 40px;
      }

      .upload-section {
        grid-template-columns: 1fr;
      }

      .insights-grid {
        grid-template-columns: 1fr;
      }

      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .progress-timeline {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .nav-outer { padding: 12px 16px; }
      nav { padding: 8px 8px 8px 20px; }
      #nav-links { display: none; }

      .card {
        padding: 24px;
      }
      .upload-card {
        padding: 24px;
      }
      .metric-card {
        padding: 20px;
      }
      .result-card {
        padding: 20px;
      }
      .insight-card {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .progress-timeline {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .progress-step {
        padding: 12px;
      }

      .metric-value {
        font-size: 28px;
      }

      .section-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
  <div class="orb orb-6"></div>
</div>

<!-- NAVIGATION -->
<div class="nav-outer">
  <nav>
    <a id="nav-brand" href="#home">AI Resume Analyzer</a>
    <div id="nav-links">
      <ul>
        <li><a href="#upload" class="nav-link active">Upload</a></li>
        <li><a href="#analysis" class="nav-link">Analysis</a></li>
        <li><a href="#reports" class="nav-link">Reports</a></li>
      </ul>
    </div>
    <div class="nav-actions">
      <button class="btn-cta" id="clear-all-btn" style="display:none;">Clear</button>
    </div>
  </nav>
</div>

<!-- MAIN DASHBOARD -->
<div class="dashboard">
  
  <!-- UPLOAD SECTION -->
  <div id="upload-section">
    <h2 class="section-title">Upload Your <strong>Documents</strong></h2>
    
    <div class="upload-section">
      <!-- Resume Upload -->
      <div class="upload-card">
        <label class="upload-label">📄 Resume PDF</label>
        <div class="drop-zone" id="resume-drop">
          <div class="drop-zone-icon">⬆️</div>
          <div class="drop-zone-text">Drag & drop your resume</div>
          <div class="drop-zone-hint">or</div>
          <button class="btn-browse" onclick="document.getElementById('resume-input').click()">Browse Files</button>
          <input type="file" id="resume-input" class="hidden-input" accept=".pdf" />
        </div>
        <div class="upload-file-info" id="resume-info"></div>
      </div>

      <!-- Job Description Upload -->
      <div class="upload-card">
        <label class="upload-label">📋 Job Description PDF</label>
        <div class="drop-zone" id="jd-drop">
          <div class="drop-zone-icon">⬆️</div>
          <div class="drop-zone-text">Drag & drop job description</div>
          <div class="drop-zone-hint">or</div>
          <button class="btn-browse" onclick="document.getElementById('jd-input').click()">Browse Files</button>
          <input type="file" id="jd-input" class="hidden-input" accept=".pdf" />
        </div>
        <div class="upload-file-info" id="jd-info"></div>
      </div>
    </div>

    <button class="btn-analyze" id="analyze-btn" disabled>Start Analysis</button>
  </div>

  <!-- PROGRESS TIMELINE -->
  <div id="progress-section" class="progress-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Analysis <strong>Progress</strong></h2>
    <div class="progress-timeline" id="progress-timeline"></div>
  </div>

  <!-- METRICS SECTION -->
  <div id="metrics-section" class="metrics-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Summary <strong>Metrics</strong></h2>
    <div class="metrics-grid" id="metrics-grid"></div>
  </div>

  <!-- RESULTS SECTION -->
  <div id="results-section" class="results-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Analysis <strong>Results</strong></h2>
    <div class="results-grid" id="results-grid"></div>
  </div>

  <!-- INSIGHTS SECTION -->
  <div id="insights-section" class="insights-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Document <strong>Insights</strong></h2>
    <div class="insights-grid" id="insights-grid"></div>
  </div>

  <!-- PERFORMANCE SECTION -->
  <div id="performance-section" class="performance-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Analysis <strong>Performance</strong></h2>
    <div class="performance-card" id="performance-card"></div>
  </div>

  <!-- REPORTS SECTION -->
  <div id="reports-section" class="reports-section">
    <h2 class="section-title" style="opacity:1;transform:none;">Report <strong>History</strong></h2>
    <div class="reports-grid" id="reports-grid"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// FILE UPLOAD HANDLING
// ══════════════════════════════════════════════════════════════════

let uploadedFiles = {
  resume: null,
  jd: null
};

const fileInputs = {
  resume: document.getElementById('resume-input'),
  jd: document.getElementById('jd-input')
};

const dropZones = {
  resume: document.getElementById('resume-drop'),
  jd: document.getElementById('jd-drop')
};

const fileInfos = {
  resume: document.getElementById('resume-info'),
  jd: document.getElementById('jd-info')
};

// Handle file selection
function setupFileHandler(type) {
  const input = fileInputs[type];
  const dropZone = dropZones[type];
  const fileInfo = fileInfos[type];

  // File input change
  input.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      handleFile(type, e.target.files[0]);
    }
  });

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) {
      handleFile(type, e.dataTransfer.files[0]);
    }
  });
}

function handleFile(type, file) {
  if (!file.type.includes('pdf')) {
    alert('Please upload a PDF file');
    return;
  }

  uploadedFiles[type] = file;
  const fileInfo = fileInfos[type];
  const fileName = file.name;
  const fileSize = (file.size / (1024 * 1024)).toFixed(2);

  fileInfo.innerHTML = `
    <strong>${fileName}</strong><br>
    Size: ${fileSize} MB
  `;
  fileInfo.classList.add('visible');

  checkAnalyzeButton();
}

function checkAnalyzeButton() {
  const btn = document.getElementById('analyze-btn');
  const hasResume = uploadedFiles.resume !== null;
  const hasJD = uploadedFiles.jd !== null;
  btn.disabled = !(hasResume && hasJD);
}

setupFileHandler('resume');
setupFileHandler('jd');

// ══════════════════════════════════════════════════════════════════
// ANALYSIS FLOW
// ══════════════════════════════════════════════════════════════════

const analyzeBtn = document.getElementById('analyze-btn');
const progressSection = document.getElementById('progress-section');
const metricsSection = document.getElementById('metrics-section');
const resultsSection = document.getElementById('results-section');
const insightsSection = document.getElementById('insights-section');
const performanceSection = document.getElementById('performance-section');
const reportsSection = document.getElementById('reports-section');

const progressSteps = [
  { name: 'Uploading PDFs', icon: '📤' },
  { name: 'Resume Extracted', icon: '📝' },
  { name: 'JD Extracted', icon: '📝' },
  { name: 'Prompt Generated', icon: '✨' },
  { name: 'Running LLM', icon: '🤖' },
  { name: 'Generating Analysis', icon: '⚙️' },
  { name: 'Report Saved', icon: '💾' }
];

let latestAnalysis = null;

analyzeBtn.addEventListener('click', startAnalysis);

async function startAnalysis() {
  const btn = analyzeBtn;
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  // Show progress section
  progressSection.classList.add('visible');
  const progressTimeline = document.getElementById('progress-timeline');
  progressTimeline.innerHTML = '';

  progressSteps.forEach((step, index) => {
    const stepEl = document.createElement('div');
    stepEl.className = 'progress-step';
    stepEl.style.animationDelay = `${index * 0.15}s`;
    stepEl.innerHTML = `
      <span class="progress-step-icon">${step.icon}</span>
      <div class="progress-step-text">${step.name}</div>
    `;
    progressTimeline.appendChild(stepEl);
  });

  function markStep(index) {
    const steps = document.querySelectorAll('.progress-step');
    if (steps[index]) {
      steps[index].classList.add('complete');
      const icon = steps[index].querySelector('.progress-step-icon');
      icon.textContent = '✓';
      icon.classList.add('checkmark');
    }
  }

  async function step(index) {
    markStep(index);
    await new Promise(r => setTimeout(r, 400));
  }

  try {
    // Step 0: Uploading
    await step(0);

    // Build form data
    const formData = new FormData();
    formData.append('resume', uploadedFiles.resume);
    formData.append('jd', uploadedFiles.jd);

    // Step 1: Resume extracted
    await step(1);
    // Step 2: JD extracted
    await step(2);
    // Step 3: Prompt generated
    await step(3);
    // Step 4-5: LLM running
    await step(4);
    await step(5);

    // Call API
    const response = await fetch('/analyze', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || 'Analysis failed');
    }

    const result = await response.json();
    latestAnalysis = result.data;

    // Step 6: Report saved
    await step(6);
    await new Promise(r => setTimeout(r, 400));

    // Show results
    metricsSection.classList.add('visible');
    renderMetrics(result.data);

    await new Promise(r => setTimeout(r, 300));
    resultsSection.classList.add('visible');
    renderResults(result.data);

    await new Promise(r => setTimeout(r, 300));
    insightsSection.classList.add('visible');
    renderInsights(result.data);

    await new Promise(r => setTimeout(r, 300));
    performanceSection.classList.add('visible');
    renderPerformance(result.data);

    reportsSection.classList.add('visible');
    renderReportHistory();

    document.getElementById('clear-all-btn').style.display = 'flex';
  } catch (err) {
    alert('Error: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Analysis';
  }
}

// ══════════════════════════════════════════════════════════════════
// METRICS RENDERING
// ══════════════════════════════════════════════════════════════════

function renderMetrics(data) {
  const grid = document.getElementById('metrics-grid');
  grid.innerHTML = '';

  const metrics = [
    { label: 'Match Score', value: data.match_score ?? '-', unit: '%' },
    { label: 'Skills Matched', value: (data.matching_skills || []).length, unit: '' },
    { label: 'Missing Skills', value: (data.missing_skills || []).length, unit: '' },
    { label: 'Runtime', value: (data.total_runtime_seconds ?? '-').toString(), unit: 's' }
  ];

  metrics.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.style.animationDelay = `${i * 0.15}s`;
    card.innerHTML = `
      <div class="metric-value">${m.value}<span style="font-size:0.6em">${m.unit}</span></div>
      <div class="metric-label">${m.label}</div>
    `;
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// RESULTS RENDERING
// ══════════════════════════════════════════════════════════════════

function renderResults(data) {
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';

  const cards = [
    {
      title: 'Match Score',
      render: () => `
        <div style="font-size:48px;font-weight:700;color:var(--text-primary);text-align:center;padding:16px 0">
          ${data.match_score ?? '-'}<span style="font-size:24px;opacity:0.6">%</span>
        </div>`
    },
    {
      title: 'Matching Skills',
      render: () => (data.matching_skills || []).length
        ? '<div class="result-content">' + data.matching_skills.map(s => `<span class="skill-tag">${s}</span>`).join('') + '</div>'
        : '<p style="color:var(--text-secondary)">No matching skills found</p>'
    },
    {
      title: 'Missing Skills',
      render: () => (data.missing_skills || []).length
        ? '<div class="result-content">' + data.missing_skills.map(s => `<span class="skill-tag">${s}</span>`).join('') + '</div>'
        : '<p style="color:var(--text-secondary)">No missing skills identified</p>'
    },
    {
      title: 'Strengths',
      render: () => (data.strengths || []).length
        ? '<ul class="result-list">' + data.strengths.map(s => `<li class="result-item">${s}</li>`).join('') + '</ul>'
        : '<p style="color:var(--text-secondary)">No strengths listed</p>'
    },
    {
      title: 'Weaknesses',
      render: () => (data.weaknesses || []).length
        ? '<ul class="result-list">' + data.weaknesses.map(s => `<li class="result-item">${s}</li>`).join('') + '</ul>'
        : '<p style="color:var(--text-secondary)">No weaknesses listed</p>'
    },
    {
      title: 'Recommendations',
      render: () => (data.recommendations || []).length
        ? data.recommendations.map((r, i) =>
            `<div class="result-numbered"><div class="result-number">${i + 1}</div><div>${r}</div></div>`
          ).join('')
        : '<p style="color:var(--text-secondary)">No recommendations</p>'
    }
  ];

  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'result-card';
    el.style.animationDelay = `${i * 0.12}s`;
    el.innerHTML = `<div class="result-title">${card.title}</div>${card.render()}`;
    grid.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════════════════
// INSIGHTS RENDERING
// ══════════════════════════════════════════════════════════════════

function renderInsights(data) {
  const grid = document.getElementById('insights-grid');
  grid.innerHTML = '';

  const insights = [
    {
      title: 'Resume Summary',
      icon: '📄',
      data: {
        fileName: data.resume_filename || 'Unknown',
        candidateName: data.candidate_name || 'Unknown',
        candidateRole: data.candidate_role || 'Unknown'
      },
      preview: data.strengths?.[0] || 'No summary available.'
    },
    {
      title: 'Job Description Summary',
      icon: '📋',
      data: {
        fileName: data.jd_filename || 'Unknown',
        matchScore: data.match_score ?? '-',
        missingSkills: (data.missing_skills || []).length
      },
      preview: data.weaknesses?.[0] || 'No summary available.'
    }
  ];

  insights.forEach((insight, i) => {
    const card = document.createElement('div');
    card.className = 'insight-card';
    card.style.animationDelay = `${i * 0.15}s`;

    let metaHTML = '';
    for (const [key, val] of Object.entries(insight.data)) {
      const label = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
      metaHTML += `
        <div class="insight-meta-item">
          <span class="insight-meta-label">${label}:</span>
          <span class="insight-meta-value">${val}</span>
        </div>`;
    }

    card.innerHTML = `
      <div class="insight-title">${insight.icon} ${insight.title}</div>
      <div class="insight-meta">${metaHTML}</div>
      <div class="insight-preview">"${insight.preview}"</div>
    `;
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════════
// PERFORMANCE RENDERING
// ══════════════════════════════════════════════════════════════════

function renderPerformance(data) {
  const card = document.getElementById('performance-card');
  const now = new Date().toLocaleString('en-US', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });

  card.innerHTML = `
    <div class="performance-item">
      <span class="performance-label">Total Runtime</span>
      <span class="performance-value">${data.total_runtime_seconds ?? '-'}s</span>
    </div>
    <div class="performance-item">
      <span class="performance-label">LLM Runtime</span>
      <span class="performance-value">${data.llm_runtime_seconds ?? '-'}s</span>
    </div>
    <div class="performance-item">
      <span class="performance-label">Processing Time</span>
      <span class="performance-value">${data.processing_runtime_seconds ?? '-'}s</span>
    </div>
    <div class="performance-item">
      <span class="performance-label">Generated At</span>
      <span class="performance-value">${now}</span>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════════
// REPORT HISTORY
// ══════════════════════════════════════════════════════════════════

async function renderReportHistory() {
  const grid = document.getElementById('reports-grid');
  const section = document.getElementById('reports-section');

  try {
    const res = await fetch('/reports');
    const data = await res.json();
    const reports = data.reports || [];

    if (reports.length === 0) {
      grid.innerHTML = '<p style="color:var(--text-secondary);">No reports yet. Run an analysis first!</p>';
      return;
    }

    grid.innerHTML = '';
    reports.slice(0, 6).forEach((report, i) => {
      const card = document.createElement('div');
      card.className = 'report-card';
      card.style.animationDelay = `${i * 0.1}s`;
      card.innerHTML = `
        <div class="report-header">
          <div class="report-name">${report.candidate_name || 'Unknown'} — ${report.candidate_role || 'Unknown'}</div>
          <div class="report-score">${report.match_score ?? '-'}%</div>
        </div>
        <div class="report-time">${report.filename}</div>
        <div class="report-actions">
          <button class="report-btn report-btn-view" onclick="viewReport('${report.filename}')">View</button>
          <button class="report-btn report-btn-download" onclick="downloadReport('${report.filename}')">Download</button>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    grid.innerHTML = '<p style="color:var(--text-secondary);">Could not load reports.</p>';
  }
}

async function viewReport(filename) {
  try {
    const res = await fetch('/reports');
    const data = await res.json();
    const report = (data.reports || []).find(r => r.filename === filename);
    if (report) {
      alert(`Report: ${report.candidate_name}\nRole: ${report.candidate_role}\nMatch Score: ${report.match_score}%`);
    }
  } catch (err) {
    alert('Could not load report');
  }
}

async function downloadReport(filename) {
  try {
    const res = await fetch(`/reports/${filename}`);
    if (!res.ok) throw new Error('Not found');
    const json = await res.json();
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Could not download report');
  }
}

// Load report history on page load
window.addEventListener('load', renderReportHistory);

// ══════════════════════════════════════════════════════════════════
// CLEAR ALL FUNCTIONALITY
// ══════════════════════════════════════════════════════════════════

document.getElementById('clear-all-btn').addEventListener('click', () => {
  uploadedFiles = { resume: null, jd: null };
  fileInputs.resume.value = '';
  fileInputs.jd.value = '';
  fileInfos.resume.innerHTML = '';
  fileInfos.resume.classList.remove('visible');
  fileInfos.jd.innerHTML = '';
  fileInfos.jd.classList.remove('visible');
  
  progressSection.classList.remove('visible');
  metricsSection.classList.remove('visible');
  resultsSection.classList.remove('visible');
  insightsSection.classList.remove('visible');
  performanceSection.classList.remove('visible');
  
  document.getElementById('clear-all-btn').style.display = 'none';
  checkAnalyzeButton();
});

// ══════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════

document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
  });
});

</script>

</body>
</html>
